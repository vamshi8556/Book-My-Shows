<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Owner Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">

    <h2>Theater Owner Registration</h2>

    <form id="ownerForm">

        <input type="text" placeholder="Owner Name" required>

        <input type="text" placeholder="Theater Name" required>

        <input type="email" placeholder="Email Address" required>

        <input type="tel" placeholder="Phone Number" required>

        <input type="text" placeholder="License Number" required>

        <input type="text" placeholder="GST Number">

        <textarea placeholder="Theater Address"></textarea>

        <input type="text" placeholder="City">

        <input type="text" placeholder="State">

        <input type="text" placeholder="Pincode">

        <input type="number" placeholder="Number of Screens" min="1">

        <input type="password" placeholder="Password" required>

        <input type="password" placeholder="Confirm Password" required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        <a href="index.html">← Back to Home</a>
    </p>

</div>

<script src="js/script.js"></script>

</body>
</html>
